<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SCS Essential Contacts</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy:#0A1628;
  --navy2:#111f38;
  --navy3:#1a2f50;
  --navy4:#243A6A;
  --accent:#F5A623;
  --accent2:#E8562A;
  --teal:#27AE8F;
  --purple:#7B5EA7;
  --pink:#D4537E;
  --green:#3A7D44;
  --white:#fff;
  --bg:#F0F4FA;
  --card:#fff;
  --border:#E4EAF4;
  --muted:#8096B4;
  --text:#0A1628;
  --textmid:#445577;
}

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow-x:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:272px;min-width:272px;background:var(--navy);
  min-height:100vh;display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:200;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;overflow-x:hidden;
}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--navy3)}

.sb-logo{
  padding:22px 20px 18px;
  border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;gap:12px;
}
.sb-logo-icon{
  width:42px;height:42px;background:var(--accent);
  border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sb-logo-icon svg{width:22px;height:22px;fill:white}
.sb-logo-text{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#fff;line-height:1.15}
.sb-logo-sub{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:2px}

.sb-stats{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
  padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.07);
}
.sb-stat{background:var(--navy2);border-radius:10px;padding:10px 8px;text-align:center}
.sb-stat .n{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#fff}
.sb-stat .l{font-size:9px;color:var(--muted);letter-spacing:.06em;margin-top:2px;text-transform:uppercase}

.sb-nav{padding:14px 10px;flex:1}
.sb-nav-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:0 10px;margin:10px 0 6px}
.nav-btn{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:10px 12px;border-radius:10px;
  background:none;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  color:var(--muted);text-align:left;margin-bottom:2px;
  transition:background .15s,color .15s;
}
.nav-btn:hover{background:var(--navy2);color:#fff}
.nav-btn.active{background:var(--accent);color:#fff}
.nav-btn .nb-icon{
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:15px;
}
.nav-btn.active .nb-icon{background:rgba(255,255,255,.18)}
.nb-badge{
  margin-left:auto;padding:2px 8px;border-radius:20px;
  font-size:10px;font-weight:700;
  background:var(--navy3);color:var(--muted);
}
.nav-btn.active .nb-badge{background:rgba(0,0,0,.2);color:rgba(255,255,255,.8)}

.sb-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,.07)}
.add-btn{
  width:100%;padding:11px 0;
  background:linear-gradient(135deg,var(--accent),#e08b0a);
  color:#fff;border:none;border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .15s,transform .15s;letter-spacing:.02em;
}
.add-btn:hover{opacity:.9;transform:translateY(-1px)}

/* ── MAIN ── */
.main{margin-left:272px;flex:1;display:flex;flex-direction:column;min-height:100vh}

.topbar{
  background:#fff;padding:14px 28px;
  display:flex;align-items:center;gap:14px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.hamburger{
  display:none;background:none;border:none;cursor:pointer;
  padding:6px;flex-direction:column;gap:4px;
}
.hamburger span{width:20px;height:2px;background:var(--text);border-radius:2px;display:block}

.search-box{
  flex:1;max-width:400px;display:flex;align-items:center;gap:9px;
  background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:8px 13px;
}
.search-box svg{width:15px;height:15px;color:var(--muted);flex-shrink:0}
.search-box input{border:none;background:none;outline:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);flex:1}
.search-box input::placeholder{color:var(--muted)}

.tb-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.view-btns{display:flex;gap:4px}
.vbtn{
  width:34px;height:34px;border-radius:8px;
  border:1.5px solid var(--border);background:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.vbtn svg{width:14px;height:14px;color:var(--muted)}
.vbtn.active{background:var(--navy);border-color:var(--navy)}
.vbtn.active svg{color:#fff}

/* ── CONTENT ── */
.content{padding:24px 28px;flex:1}

.page-head{margin-bottom:22px}
.page-head-row{display:flex;align-items:center;gap:12px}
.page-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text)}
.page-count{
  background:var(--navy);color:#fff;
  font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;
}
.page-sub{font-size:12px;color:var(--muted);margin-top:4px}

/* ── CARDS ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:16px}

.contact-card{
  background:var(--card);border-radius:16px;
  border:1.5px solid var(--border);
  padding:20px 18px 16px;cursor:default;
  transition:transform .2s,box-shadow .2s,border-color .2s;
  position:relative;overflow:hidden;
}
.contact-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--card-top,var(--accent));
}
.contact-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(10,22,40,.10);border-color:#cdd8eb}

.cc-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.avatar{
  width:48px;height:48px;border-radius:13px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff;
}
.cc-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);line-height:1.2}
.cc-role{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.3}

.dept-pill{
  display:inline-block;font-size:9.5px;font-weight:700;
  padding:3px 9px;border-radius:20px;margin-bottom:12px;letter-spacing:.04em;text-transform:uppercase;
}
.cc-info{display:flex;flex-direction:column;gap:6px}
.info-row{display:flex;align-items:flex-start;gap:7px;font-size:11.5px;color:var(--textmid)}
.info-row svg{width:12px;height:12px;flex-shrink:0;color:var(--muted);margin-top:1px}
.info-row a{color:var(--textmid);text-decoration:none}
.info-row a:hover{color:var(--accent)}

.cc-actions{display:flex;gap:8px;margin-top:14px;padding-top:13px;border-top:1px solid var(--border)}
.ca-btn{
  flex:1;padding:7px 0;border-radius:8px;
  border:1.5px solid var(--border);background:#fff;
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;
  cursor:pointer;color:var(--textmid);
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all .15s;
}
.ca-btn:hover{border-color:var(--accent);color:var(--accent);background:#FFF8EE}
.ca-btn.pri{background:var(--navy);border-color:var(--navy);color:#fff}
.ca-btn.pri:hover{background:var(--navy3);border-color:var(--navy3)}

/* ── TABLE VIEW ── */
.table-wrap{background:#fff;border-radius:14px;border:1.5px solid var(--border);overflow:hidden}
.table-wrap table{width:100%;border-collapse:collapse;font-size:12.5px}
.table-wrap thead th{
  background:var(--navy);color:#fff;
  padding:11px 14px;font-weight:700;font-family:'Syne',sans-serif;font-size:11px;letter-spacing:.04em;
  text-align:left;white-space:nowrap;
}
.table-wrap thead th:first-child{border-radius:0}
.table-wrap tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
.table-wrap tbody tr:last-child{border-bottom:none}
.table-wrap tbody tr:hover{background:#F7FAFF}
.table-wrap tbody td{padding:11px 14px;color:var(--textmid);vertical-align:top}
.table-wrap tbody td:first-child{color:var(--muted);font-weight:600;font-size:11px}
.td-name{font-weight:700;color:var(--text);font-family:'Syne',sans-serif;font-size:12px}
.td-badge{
  display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;
  text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;
}
.phone-link{color:var(--navy3);text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
.phone-link:hover{color:var(--accent);text-decoration:underline}
.multi-phones{display:flex;flex-direction:column;gap:3px}

/* ── LIST VIEW ── */
.list-view{display:flex;flex-direction:column;gap:8px}
.list-item{
  background:#fff;border-radius:12px;border:1.5px solid var(--border);
  padding:12px 18px;display:flex;align-items:center;gap:14px;
  transition:all .15s;
}
.list-item:hover{border-color:#cdd8eb;box-shadow:0 4px 16px rgba(10,22,40,.07)}
.li-info{flex:1;min-width:0}
.li-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
.li-role{font-size:11px;color:var(--muted);margin-top:2px}
.li-meta{display:flex;align-items:center;gap:20px;font-size:11.5px;color:var(--textmid);margin-left:auto}
.li-meta span{display:flex;align-items:center;gap:5px;white-space:nowrap}
.li-meta svg{width:11px;height:11px;color:var(--muted)}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;background:rgba(10,22,40,.6);
  display:flex;align-items:center;justify-content:center;
  z-index:300;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .22s;
}
.overlay.open{opacity:1;pointer-events:all}
.modal{
  background:#fff;border-radius:20px;width:100%;max-width:480px;
  max-height:92vh;overflow-y:auto;
  transform:translateY(18px) scale(.97);transition:transform .22s;
  box-shadow:0 24px 64px rgba(10,22,40,.25);
}
.overlay.open .modal{transform:none}
.modal-hd{
  padding:22px 22px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--text)}
.modal-x{
  width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);
  background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--muted);transition:all .14s;
}
.modal-x:hover{background:#FFF0ED;border-color:var(--accent2);color:var(--accent2)}
.modal-body{padding:18px 22px 8px}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.f-grp{display:flex;flex-direction:column;gap:5px}
.f-grp.full{grid-column:1/-1}
.f-grp label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase}
.f-grp input,.f-grp select{
  padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);
  outline:none;transition:border-color .15s;background:var(--bg);
}
.f-grp input:focus,.f-grp select:focus{border-color:var(--accent);background:#fff}
.modal-ft{display:flex;gap:10px;padding:8px 22px 20px}
.btn-cancel{
  flex:1;padding:11px 0;border-radius:10px;border:1.5px solid var(--border);
  background:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;color:var(--textmid);transition:all .15s;
}
.btn-cancel:hover{border-color:var(--muted)}
.btn-save{
  flex:2;padding:11px 0;border-radius:10px;border:none;
  background:var(--navy);color:#fff;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;
}
.btn-save:hover{opacity:.85}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty svg{width:44px;height:44px;margin-bottom:14px;opacity:.35}

/* ── RESPONSIVE ── */
@media(max-width:960px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:none;box-shadow:0 0 0 9999px rgba(10,22,40,.45)}
  .main{margin-left:0}
  .hamburger{display:flex}
  .content{padding:18px 16px}
  .topbar{padding:12px 16px}
}
@media(max-width:640px){
  .cards-grid{grid-template-columns:1fr}
  .f-row{grid-template-columns:1fr}
  .li-meta{display:none}
  .table-wrap{overflow-x:auto}
}
@media(max-width:400px){
  .content{padding:12px 10px}
  .topbar{padding:10px 10px}
}
</style>
</head>
<body>

<!-- ── SIDEBAR ─────────────────────────── -->
<aside class="sidebar" id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 10c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm4 4H8v-.5c0-1.4 2.7-2 4-2s4 .6 4 2V16z"/></svg>
    </div>
    <div>
      <div class="sb-logo-text">SCS Contacts</div>
      <div class="sb-logo-sub">Essential Directory</div>
    </div>
  </div>

  <div class="sb-stats" id="sbStats"></div>

  <nav class="sb-nav">
    <div class="sb-nav-label">Departments</div>
    <div id="navList"></div>
  </nav>

  <div class="sb-footer">
    <button class="add-btn" onclick="openModal()">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="white"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6z"/></svg>
      Add New Contact
    </button>
  </div>
</aside>

<!-- ── MAIN ────────────────────────────── -->
<div class="main">
  <div class="topbar">
    <button class="hamburger" onclick="toggleSB()" aria-label="Menu"><span></span><span></span><span></span></button>

    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="srch" type="text" placeholder="Search by name, designation, vehicle…" oninput="render()"/>
    </div>

    <div class="tb-right">
      <div class="view-btns">
        <button class="vbtn" id="vCard" onclick="setView('card')" title="Card view">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
        <button class="vbtn" id="vList" onclick="setView('list')" title="List view">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="5" width="18" height="2"/><rect x="3" y="11" width="18" height="2"/><rect x="3" y="17" width="18" height="2"/></svg>
        </button>
        <button class="vbtn active" id="vTable" onclick="setView('table')" title="Table view">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="page-head">
      <div class="page-head-row">
        <span class="page-title" id="pgTitle">All Contacts</span>
        <span class="page-count" id="pgCount">0</span>
      </div>
      <div class="page-sub" id="pgSub">SCS Essential Office Directory</div>
    </div>
    <div id="container"></div>
  </div>
</div>

<!-- ── ADD MODAL ─────────────────────── -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title">Add New Contact</div>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="f-row">
        <div class="f-grp"><label>Full Name</label><input id="fn" placeholder="Mr. John Doe"/></div>
        <div class="f-grp"><label>Department</label>
          <select id="fd">
            <option value="">Select…</option>
            <option>Driver</option><option>C4</option><option>Administration</option><option>IT</option><option>Operation</option>
          </select>
        </div>
      </div>
      <div class="f-row">
        <div class="f-grp"><label>Designation / Role</label><input id="fr" placeholder="Manager"/></div>
        <div class="f-grp"><label>Contact Number</label><input id="fc" placeholder="01700-000000"/></div>
      </div>
      <div class="f-row" style="margin-bottom:0">
        <div class="f-grp"><label>Extra Info (Hub / Dept / Vehicle)</label><input id="fx" placeholder="Hub Keraniganj (HKG)"/></div>
        <div class="f-grp"><label>Extra Info 2 (Division / ID)</label><input id="fy" placeholder="CHATTAGRAM"/></div>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveContact()">Save Contact</button>
    </div>
  </div>
</div>

  const parts=n.trim().split(/\s+/);
  if(parts.length===1)return parts[0].substring(0,2).toUpperCase();

}

/* build unified list */
function buildContacts(){
  const all=[];
  driverData.forEach(d=>all.push({
    _id:d.id,dept:'Driver',name:d.name,
    line1:d.vehicle,line2:d.driverId,line3:d.from,
    contact:d.contact,role:d.vehicle,sub:d.from
  }));
  c4Data.forEach(d=>all.push({
    _id:d.id,dept:'C4',name:d.name,
    line1:d.division,line2:d.hub,line3:'',
    contact:d.contact,role:d.division,sub:d.hub
  }));
  adminData.forEach(d=>all.push({
    _id:d.id,dept:'Administration',name:d.name,
    line1:d.designation,line2:'',line3:'',
    contact:d.contact,role:d.designation,sub:''
  }));
  itData.forEach(d=>all.push({
    _id:d.id,dept:'IT',name:d.name,
    line1:d.designation,line2:d.dept,line3:'',
    contact:d.contact,role:d.designation,sub:d.dept
  }));
  operationData.forEach(d=>all.push({
    _id:d.id,dept:'Operation',name:d.name,
    line1:d.designation,line2:d.role,line3:'',
    contact:d.contact,role:d.designation,sub:d.role
  }));
  return all;
}
let allContacts=buildContacts();
let curDept='All', curView='table', nextId=1000;

/* ═══════════════ HELPERS ═══════════════ */
function getDC(k){return DEPTS.find(d=>d.key===k)||DEPTS[0]}

function phoneLinks(c,multi){
  if(!c||c==='N/A')return '<span style="color:var(--muted)">N/A</span>';
  const nums=c.split(/&/).map(s=>s.trim()).filter(Boolean);
  if(nums.length===1){
    return `<a class="phone-link" href="tel:${nums[0].replace(/\D/g,'')}">${nums[0]}</a>`;
  }
  return `<div class="${multi?'multi-phones':''}">${nums.map(n=>`<a class="phone-link" href="tel:${n.replace(/\D/g,'')}">📞 ${n}</a>`).join('')}</div>`;
}

/* ═══════════════ RENDER NAV ═══════════════ */
function renderNav(){
  const list=document.getElementById('navList');
  list.innerHTML=DEPTS.map(d=>{
    const cnt=d.key==='All'?allContacts.length:allContacts.filter(c=>c.dept===d.key).length;
    return`<button class="nav-btn${curDept===d.key?' active':''}" onclick="selectDept('${d.key}')">
      <span class="nb-icon">${d.icon}</span>${d.label}<span class="nb-badge">${cnt}</span>
    </button>`;
  }).join('');

  const stats=document.getElementById('sbStats');
  const total=allContacts.length;
  const depts=new Set(allContacts.map(c=>c.dept)).size;
  const hubs=new Set(driverData.map(d=>d.from)).size;
  stats.innerHTML=`
    <div class="sb-stat"><div class="n">${total}</div><div class="l">Total</div></div>
    <div class="sb-stat"><div class="n">${depts}</div><div class="l">Depts</div></div>
    <div class="sb-stat"><div class="n">${hubs}</div><div class="l">Hubs</div></div>
  `;
}

/* ═══════════════ RENDER CONTACTS ═══════════════ */
function render(){
  const q=(document.getElementById('srch').value||'').toLowerCase();
  let list=curDept==='All'?[...allContacts]:allContacts.filter(c=>c.dept===curDept);
  if(q)list=list.filter(c=>
    c.name.toLowerCase().includes(q)||
    c.role.toLowerCase().includes(q)||
    c.contact.toLowerCase().includes(q)||
    (c.line1||'').toLowerCase().includes(q)||
    (c.line2||'').toLowerCase().includes(q)||
    (c.line3||'').toLowerCase().includes(q)||
    c.dept.toLowerCase().includes(q)
  );

  const dc=getDC(curDept);
  document.getElementById('pgTitle').textContent=dc.label;
  document.getElementById('pgCount').textContent=list.length;
  document.getElementById('pgSub').textContent=
    curDept==='All'?'SCS Essential Office Directory — All Departments'
    :`${dc.label} department — ${list.length} contact${list.length!==1?'s':''}`;

  const box=document.getElementById('container');
  if(!list.length){box.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><p>No contacts found</p></div>`;return}

  if(curView==='card')   box.innerHTML=renderCards(list);
  else if(curView==='list') box.innerHTML=renderList(list);
  else                      box.innerHTML=renderTable(list);
}

/* ─ CARD VIEW ─ */
function renderCards(list){

    const dc=getDC(c.dept);
    const av=`background:${avc(c._id)}`;
    return`<div class="contact-card" style="--card-top:${dc.top}">
      <div class="cc-head">
        <div class="avatar" style="${av}">${initials(c.name)}</div>
        <div><div class="cc-name">${c.name}</div><div class="cc-role">${c.line1||c.role||''}</div></div>
      </div>
      <span class="dept-pill" style="background:${dc.bg};color:${dc.color}">${c.dept}</span>
      <div class="cc-info">
        ${c.contact&&c.contact!=='N/A'?`<div class="info-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.42 2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6.29 6.29l.91-.91a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>${phoneLinks(c.contact,true)}</div>`:''}
        ${c.line2?`<div class="info-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span>${c.line2}</span></div>`:''}
        ${c.line3?`<div class="info-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg><span>${c.line3}</span></div>`:''}
      </div>
      <div class="cc-actions">
        ${c.contact&&c.contact!=='N/A'?`<button class="ca-btn pri" onclick="window.location.href='tel:${c.contact.split('&')[0].replace(/\D/g,'')}'">📞 Call</button>`:''}

}

/* ─ TABLE VIEW (per dept) ─ */
function renderTable(list){
  const dept=curDept==='All'?'All':curDept;
  if(dept==='Driver'||dept==='All'&&false) return renderDriverTable(list);

  if(dept==='All'){
    // group by dept and render each table
    const depts=['Driver','C4','Administration','IT','Operation'];
    return depts.map(d=>{
      const sub=list.filter(c=>c.dept===d);
      if(!sub.length)return'';
      const dc=getDC(d);
      return`<div style="margin-bottom:28px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <span style="font-family:Syne,sans-serif;font-size:16px;font-weight:800;color:var(--text)">${d}</span>
          <span style="background:${dc.bg};color:${dc.color};font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px">${sub.length}</span>
        </div>
        ${renderDeptTable(d,sub)}
      </div>`;
    }).join('');
  }
  return renderDeptTable(dept,list);
}

function renderDeptTable(dept,list){
  if(dept==='Driver')return renderDriverTable(list);
  if(dept==='C4')return renderC4Table(list);
  if(dept==='Administration')return renderAdminTable(list);
  if(dept==='IT')return renderITTable(list);
  if(dept==='Operation')return renderOpTable(list);
  return'';
}

function renderDriverTable(list){
  return`<div class="table-wrap"><table>
    <thead><tr><th>#</th><th>Vehicle No.</th><th>Driver Name</th><th>Driver ID</th><th>Contact</th><th>Hub / Location</th></tr></thead>
    <tbody>${list.map((c,i)=>`<tr>
      <td>${i+1}</td>
      <td><span style="font-weight:700;font-family:monospace;font-size:12px">${c.line1}</span></td>
      <td><div class="td-name">${c.name}</div></td>
      <td><span class="td-badge" style="background:#FAEEDA;color:#854F0B">${c.line2}</span></td>
      <td>${phoneLinks(c.contact,true)}</td>
      <td style="font-size:11.5px;color:var(--textmid)">${c.line3}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

/* ═══════════════ ACTIONS ═══════════════ */
function selectDept(k){
  curDept=k;
  if(window.innerWidth<=960)document.getElementById('sidebar').classList.remove('open');
  renderNav();render();
}
function setView(v){
  curView=v;
  ['card','list','table'].forEach(x=>document.getElementById('v'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active',x===v));
  render();
}
function toggleSB(){document.getElementById('sidebar').classList.toggle('open')}

function openModal(){document.getElementById('overlay').classList.add('open')}
function closeModal(){document.getElementById('overlay').classList.remove('open')}
function overlayClick(e){if(e.target===e.currentTarget)closeModal()}

function saveContact(){
  const name=document.getElementById('fn').value.trim();
  const dept=document.getElementById('fd').value;
  const role=document.getElementById('fr').value.trim();
  const contact=document.getElementById('fc').value.trim();
  const x1=document.getElementById('fx').value.trim();
  const x2=document.getElementById('fy').value.trim();
  if(!name||!dept){alert('Name and Department are required.');return}
  allContacts.push({_id:nextId++,dept,name,role,line1:role,line2:x1,line3:x2,contact,sub:x1});
  closeModal();
  ['fn','fd','fr','fc','fx','fy'].forEach(id=>document.getElementById(id).value='');
  renderNav();render();
}

document.addEventListener('click',function(e){
  const sb=document.getElementById('sidebar');
  if(window.innerWidth<=960&&sb.classList.contains('open')&&!sb.contains(e.target)&&!e.target.closest('.hamburger'))
    sb.classList.remove('open');
});

/* ── INIT ── */
document.getElementById('vTable').classList.add('active');
document.getElementById('vCard').classList.remove('active');
document.getElementById('vList').classList.remove('active');
renderNav();render();
</script>
