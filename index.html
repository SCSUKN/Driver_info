<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SCS Essential Contacts</title>
<link rel="icon" type="image/png" href="Fevicon.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ═══ RESET ═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0A1628; --navy2:#111f38; --navy3:#1a2f50;
  --accent:#F5A623; --accent2:#E8562A;
  --bg:#EFF3FC; --card:#fff;
  --border:#DDE5F5; --muted:#7A90B5; --text:#0A1628; --mid:#3D5278;
  --sb:272px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow-x:hidden}

/* ═══ SCROLLBAR ══════════════════════════════════════ */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#C5D0E8;border-radius:10px}

/* ═══ SIDEBAR ════════════════════════════════════════ */
.sidebar{
  width:var(--sb);min-width:var(--sb);background:var(--navy);
  min-height:100vh;display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:300;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;overflow-x:hidden;
}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:11px;flex-shrink:0}
.sb-logo-icon{width:40px;height:40px;background:var(--accent);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo-icon svg{width:21px;height:21px;fill:#fff}
.sb-logo-text{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff;line-height:1.15}
.sb-logo-sub{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:2px}

.sb-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-stat{background:var(--navy2);border-radius:9px;padding:9px 6px;text-align:center}
.sb-stat .n{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#fff}
.sb-stat .l{font-size:9px;color:var(--muted);letter-spacing:.05em;margin-top:1px;text-transform:uppercase}

.sb-nav{padding:12px 8px;flex:1}
.sb-nav-lbl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:0 10px;margin:8px 0 5px}
.nb{
  display:flex;align-items:center;gap:9px;width:100%;padding:9px 11px;border-radius:9px;
  background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:12.5px;font-weight:500;color:var(--muted);text-align:left;margin-bottom:2px;
  transition:background .14s,color .14s;
}
.nb:hover{background:var(--navy2);color:#fff}
.nb.act{background:var(--accent);color:#fff}
.nb .ic{width:30px;height:30px;border-radius:7px;flex-shrink:0;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:14px}
.nb.act .ic{background:rgba(255,255,255,.18)}
.nb .badge{margin-left:auto;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;background:var(--navy3);color:var(--muted)}
.nb.act .badge{background:rgba(0,0,0,.2);color:rgba(255,255,255,.8)}

.sb-footer{padding:12px 14px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
.add-btn{width:100%;padding:11px 0;background:linear-gradient(135deg,var(--accent),#d4890a);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s,transform .12s}
.add-btn:hover{opacity:.88;transform:translateY(-1px)}
.add-btn:active{transform:scale(.98)}

/* ═══ MAIN ═══════════════════════════════════════════ */
.main{margin-left:var(--sb);flex:1;display:flex;flex-direction:column;min-height:100vh;max-width:100%}

/* ── TOPBAR ── */
.topbar{background:#fff;padding:12px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;flex-wrap:wrap}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:5px;flex-direction:column;gap:4px;flex-shrink:0}
.hamburger span{width:20px;height:2px;background:var(--text);border-radius:2px;display:block;transition:all .2s}
.hamburger.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}

.search-box{flex:1;min-width:160px;max-width:380px;display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:7px 12px}
.search-box svg{width:14px;height:14px;color:var(--muted);flex-shrink:0}
.search-box input{border:none;background:none;outline:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);width:100%}
.search-box input::placeholder{color:var(--muted)}

.tb-actions{display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .14s;flex-shrink:0}
.icon-btn svg{width:15px;height:15px;color:var(--muted)}
.icon-btn:hover{border-color:var(--accent);background:#FFF8EE}
.icon-btn:hover svg{color:var(--accent)}
.icon-btn.act{background:var(--navy);border-color:var(--navy)}
.icon-btn.act svg{color:#fff}

.print-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;border:1.5px solid var(--border);background:#fff;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--mid);cursor:pointer;transition:all .14s;white-space:nowrap}
.print-btn svg{width:14px;height:14px}
.print-btn:hover{border-color:var(--navy);color:var(--navy);background:#F0F4FA}

/* ── FILTER BAR ── */
.filter-bar{background:#fff;padding:10px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-bar-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.filter-select{padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--mid);background:#fff;outline:none;cursor:pointer;transition:border-color .14s;min-width:130px}
.filter-select:focus{border-color:var(--accent)}
.filter-select.has-val{border-color:var(--accent);color:var(--text);background:#FFFBF0;font-weight:600}
.clear-btn{padding:6px 12px;border-radius:8px;border:1.5px solid #FBD9A0;background:#FFF8EE;font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:700;color:var(--accent2);cursor:pointer;transition:all .14s;white-space:nowrap}
.clear-btn:hover{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.filter-results{margin-left:auto;font-size:11px;color:var(--muted)}

/* ── CONTENT ── */
.content{padding:20px 24px;flex:1}
.pg-head{margin-bottom:18px}
.pg-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pg-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text)}
.pg-cnt{background:var(--navy);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
.pg-sub{font-size:11.5px;color:var(--muted);margin-top:4px}

/* ── CARDS ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.contact-card{background:#fff;border-radius:15px;border:1.5px solid var(--border);padding:18px 16px 14px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s,border-color .2s}
.contact-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-top,var(--accent))}
.contact-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(10,22,40,.10);border-color:#c8d4ec}
.cc-hd{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.avatar{width:46px;height:46px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#fff}
.cc-name{font-family:'Syne',sans-serif;font-size:13.5px;font-weight:800;color:var(--text);line-height:1.2}
.cc-role{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.3}
.dpill{display:inline-block;font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;margin-bottom:10px;letter-spacing:.05em;text-transform:uppercase}
.cc-info{display:flex;flex-direction:column;gap:5px}
.ir{display:flex;align-items:flex-start;gap:6px;font-size:11px;color:var(--mid)}
.ir svg{width:11px;height:11px;flex-shrink:0;color:var(--muted);margin-top:1px}
.ir a{color:var(--mid);text-decoration:none;font-weight:600}
.ir a:hover{color:var(--accent)}
.cc-acts{display:flex;gap:7px;margin-top:12px;padding-top:11px;border-top:1px solid var(--border)}
.ca{flex:1;padding:6px 0;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;color:var(--mid);display:flex;align-items:center;justify-content:center;gap:4px;transition:all .14s}
.ca:hover{border-color:var(--accent);color:var(--accent);background:#FFFBF0}
.ca.p{background:var(--navy);border-color:var(--navy);color:#fff}
.ca.p:hover{background:var(--navy3);border-color:var(--navy3)}

/* ── TABLE ── */
.tw{background:#fff;border-radius:13px;border:1.5px solid var(--border);overflow:hidden;width:100%}
.tw-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tw table{width:100%;border-collapse:collapse;font-size:12px}
.tw thead th{background:var(--navy);color:#fff;padding:10px 13px;font-weight:700;font-family:'Syne',sans-serif;font-size:10.5px;letter-spacing:.05em;text-align:left;white-space:nowrap}
.tw tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
.tw tbody tr:last-child{border-bottom:none}
.tw tbody tr:hover{background:#F5F9FF}
.tw tbody td{padding:10px 13px;color:var(--mid);vertical-align:middle}
.tw tbody td:first-child{color:var(--muted);font-weight:700;font-size:10.5px}
.tdn{font-weight:800;color:var(--text);font-family:'Syne',sans-serif;font-size:12px}
.tbadge{display:inline-block;font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.pl{color:var(--navy3);text-decoration:none;font-weight:700;display:inline-flex;align-items:center;gap:2px;white-space:nowrap;font-size:11.5px}
.pl:hover{color:var(--accent);text-decoration:underline}
.mpl{display:flex;flex-direction:column;gap:3px}

/* ── LIST ── */
.list-view{display:flex;flex-direction:column;gap:8px}
.li{background:#fff;border-radius:11px;border:1.5px solid var(--border);padding:11px 16px;display:flex;align-items:center;gap:12px;transition:all .14s}
.li:hover{border-color:#c8d4ec;box-shadow:0 3px 14px rgba(10,22,40,.07)}
.li-info{flex:1;min-width:0}
.li-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--text)}
.li-role{font-size:11px;color:var(--muted);margin-top:2px}
.li-meta{display:flex;align-items:center;gap:16px;font-size:11px;color:var(--mid)}
.li-meta span{display:flex;align-items:center;gap:4px;white-space:nowrap}
.li-meta svg{width:11px;height:11px;color:var(--muted)}

/* ── DEPT GROUP HEADER ── */
.dept-group-hd{display:flex;align-items:center;gap:10px;margin:20px 0 10px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.dept-group-hd:first-child{margin-top:0}
.dgh-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--text)}
.dgh-cnt{font-size:10px;font-weight:800;padding:2px 9px;border-radius:20px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(10,22,40,.6);display:flex;align-items:center;justify-content:center;z-index:400;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:18px;width:100%;max-width:460px;max-height:94vh;overflow-y:auto;transform:translateY(16px) scale(.97);transition:transform .2s;box-shadow:0 20px 60px rgba(10,22,40,.25)}
.overlay.open .modal{transform:none}
.modal-hd{padding:20px 20px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text)}
.modal-x{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);transition:all .13s}
.modal-x:hover{background:#FFF0ED;border-color:var(--accent2);color:var(--accent2)}
.modal-body{padding:16px 20px 6px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.full{grid-column:1/-1}
.fg label{font-size:9.5px;font-weight:800;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.fg input,.fg select{padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .14s;background:var(--bg)}
.fg input:focus,.fg select:focus{border-color:var(--accent);background:#fff}
.modal-ft{display:flex;gap:9px;padding:6px 20px 18px}
.btn-c{flex:1;padding:10px 0;border-radius:9px;border:1.5px solid var(--border);background:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;color:var(--mid);transition:all .13s}
.btn-c:hover{border-color:var(--muted)}
.btn-s{flex:2;padding:10px 0;border-radius:9px;border:none;background:var(--navy);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .13s}
.btn-s:hover{opacity:.85}

/* ── EMPTY ── */
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty svg{width:42px;height:42px;margin-bottom:12px;opacity:.3;display:block;margin-inline:auto}

/* ── CREDIT TAG ── */
.credit-tag{position:fixed;bottom:16px;right:16px;background:linear-gradient(135deg,var(--navy),var(--navy3));color:#fff;padding:9px 16px;border-radius:50px;box-shadow:0 6px 20px rgba(10,22,40,.25);font-size:11px;font-weight:600;display:flex;align-items:center;gap:8px;z-index:500;cursor:default;transition:transform .2s,box-shadow .2s;text-decoration:none;animation:slideUpIn .6s ease 1s both}
.credit-tag:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(10,22,40,.3)}
.credit-av{width:24px;height:24px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
.credit-tag span{white-space:nowrap}
@keyframes slideUpIn{from{transform:translateY(45px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ═══ MOBILE OVERLAY BACKDROP ════════════════════════ */
.sb-backdrop{position:fixed;inset:0;background:rgba(10,22,40,.5);z-index:299;display:none}
.sb-backdrop.show{display:block}

/* ═══ PRINT STYLES ═══════════════════════════════════ */
@media print{
  @page{size:A4 portrait;margin:12mm 10mm}
  html,body{background:#fff !important;font-size:11px}
  .sidebar,.topbar,.filter-bar,.add-btn,.hamburger,.icon-btn,.print-btn,.cc-acts,.ca,.credit-tag,.sb-backdrop,.overlay{display:none !important}
  .main{margin-left:0 !important;padding:0}
  .content{padding:0 !important}
  body{display:block}
  .print-header{display:block !important;text-align:center;padding:0 0 12px;border-bottom:2px solid #0A1628;margin-bottom:16px}
  .print-header h1{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#0A1628}
  .print-header p{font-size:11px;color:#7A90B5;margin-top:4px}
  .dept-group-hd{break-before:auto;break-inside:avoid;margin:14px 0 6px;padding-bottom:5px;border-bottom:2px solid #0A1628}
  .dgh-title{font-size:13px}
  .cards-grid{grid-template-columns:repeat(3,1fr) !important;gap:8px}
  .contact-card{border:1px solid #DDE5F5 !important;break-inside:avoid;box-shadow:none !important;padding:10px !important}
  .contact-card::before{height:2px !important}
  .tw{border:1px solid #DDE5F5;box-shadow:none}
  .tw thead th{background:#0A1628 !important;color:#fff !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:6px 8px;font-size:9px}
  .tw tbody td{padding:5px 8px;font-size:10px}
  .tw tbody tr:nth-child(even){background:#F5F8FF !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .dpill,.tbadge,.dgh-cnt{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pl{color:#0A1628 !important;text-decoration:none !important}
  .list-view .li{break-inside:avoid;border:1px solid #DDE5F5;box-shadow:none}
  .pg-head{margin-bottom:10px}
  .pg-title{font-size:16px}
  .avatar{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

/* ═══ RESPONSIVE ═════════════════════════════════════ */
@media(max-width:920px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.sb-open{transform:none}
  .main{margin-left:0}
  .hamburger{display:flex}
  .content{padding:16px 16px}
  .topbar{padding:10px 16px}
  .filter-bar{padding:10px 16px}
  .filter-results{display:none}
}
@media(max-width:600px){
  .cards-grid{grid-template-columns:1fr}
  .fr{grid-template-columns:1fr}
  .tb-actions .print-btn span{display:none}
  .li-meta{display:none}
  .topbar{gap:8px}
  .filter-bar{gap:7px}
  .filter-select{min-width:unset;font-size:11.5px}
  .search-box{max-width:none}
}
@media(max-width:400px){
  .content{padding:12px 10px}
  .topbar{padding:9px 10px}
  .filter-bar{padding:9px 10px}
  .credit-tag{bottom:10px;right:10px;font-size:10px;padding:7px 12px}
}
</style>
</head>
<body>

<!-- ══ SIDEBAR BACKDROP ══ -->
<div class="sb-backdrop" id="sbBackdrop" onclick="closeSB()"></div>

<!-- ══ SIDEBAR ══════════════════════════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 10c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm4 4H8v-.5c0-1.4 2.7-2 4-2s4 .6 4 2V16z"/></svg>
    </div>
    <div>
      <div class="sb-logo-text">SCS Contacts</div>
      <div class="sb-logo-sub">Essential Directory</div>
    </div>
  </div>
  <div class="sb-stats" id="sbStats"></div>
  <nav class="sb-nav">
    <div class="sb-nav-lbl">Departments</div>
    <div id="navList"></div>
  </nav>
  <div class="sb-footer">
    <button class="add-btn" onclick="openModal()">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="white"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6z"/></svg>
      Add New Contact
    </button>
  </div>
</aside>

<!-- ══ MAIN ══════════════════════════════════════ -->
<div class="main">

  <!-- PRINT HEADER (hidden on screen, visible on print) -->
  <div class="print-header" style="display:none">
    <h1>SCS Essential Contacts</h1>
    <p id="printMeta">Office Directory — Printed on <span id="printDate"></span></p>
  </div>

  <!-- TOPBAR -->
  <div class="topbar">
    <button class="hamburger" id="hbBtn" onclick="toggleSB()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="srch" type="text" placeholder="Search name, contact, vehicle, hub…" oninput="render()"/>
    </div>
    <div class="tb-actions">
      <!-- View Toggles -->
      <div style="display:flex;gap:4px">

function populateFilters(){
  const roles=[...new Set(allC.map(c=>c.desig).filter(Boolean))].sort();
  const hubs=[...new Set(allC.map(c=>c.hub).filter(Boolean))].sort();
  const vehicles=[...new Set(allC.filter(c=>c.dept==='Driver').map(c=>c.vehicle).filter(Boolean))].sort();

  const fRole=document.getElementById('fRole');
  const fHub=document.getElementById('fHub');
  const fVehicle=document.getElementById('fVehicle');

  fRole.innerHTML=`<option value="">All Designations / Roles</option>`+roles.map(r=>`<option value="${r}">${r}</option>`).join('');
  fHub.innerHTML=`<option value="">All Hubs / Locations</option>`+hubs.map(h=>`<option value="${h}">${h}</option>`).join('');
  fVehicle.innerHTML=`<option value="">All Vehicle Types</option>`+vehicles.map(v=>`<option value="${v}">${v}</option>`).join('');
}

function onFilterChange(el){
  if(el.value) el.classList.add('has-val'); else el.classList.remove('has-val');
  // sync dept select with sidebar
  const dv=document.getElementById('fDept').value;
  if(dv&&dv!==curDept){curDept=dv;renderNav();}
  else if(!dv&&curDept!=='All'){curDept='All';renderNav();}
  render();
}

function clearFilters(){
  ['fDept','fRole','fHub','fVehicle'].forEach(id=>{
    const el=document.getElementById(id);
    el.value='';el.classList.remove('has-val');
  });
  document.getElementById('srch').value='';
  curDept='All';renderNav();render();
}

function getFilters(){
  return{
    dept:document.getElementById('fDept').value,
    role:document.getElementById('fRole').value,
    hub:document.getElementById('fHub').value,
    vehicle:document.getElementById('fVehicle').value,
    q:(document.getElementById('srch').value||'').toLowerCase().trim()
  };
}

/* ═══════════════════════════════════════════════════
   GET FILTERED LIST
═══════════════════════════════════════════════════ */
function getFiltered(){
  const f=getFilters();
  let list=[...allC];
  if(f.dept)list=list.filter(c=>c.dept===f.dept);
  else if(curDept!=='All')list=list.filter(c=>c.dept===curDept);
  if(f.role)list=list.filter(c=>c.desig===f.role);
  if(f.hub)list=list.filter(c=>c.hub===f.hub||c.extra1===f.hub);
  if(f.vehicle)list=list.filter(c=>c.vehicle===f.vehicle);
  if(f.q)list=list.filter(c=>
    c.name.toLowerCase().includes(f.q)||
    c.desig.toLowerCase().includes(f.q)||
    c.contact.toLowerCase().includes(f.q)||
    (c.hub||'').toLowerCase().includes(f.q)||
    (c.division||'').toLowerCase().includes(f.q)||
    (c.vehicle||'').toLowerCase().includes(f.q)||
    (c.driverId||'').toLowerCase().includes(f.q)||
    c.dept.toLowerCase().includes(f.q)
  );
  return list;
}

═══════════════════════════════════════════════════ */
function pl(contact,stack){
  if(!contact||contact==='N/A')return'<span style="color:var(--muted)">N/A</span>';
  const nums=contact.split('&').map(s=>s.trim()).filter(Boolean);
  if(nums.length===1)return`<a class="pl" href="tel:${nums[0].replace(/\D/g,'')}">${nums[0]}</a>`;
  return`<div class="${stack?'mpl':''}">${nums.map(n=>`<a class="pl" href="tel:${n.replace(/\D/g,'')}">${n}</a>`).join(' ')}</div>`;
}

/* ═══════════════════════════════════════════════════
   RENDER NAV
═══════════════════════════════════════════════════ */
function renderNav(){
  const list=document.getElementById('navList');
  list.innerHTML=DEPTS.map(d=>{
    const cnt=d.key==='All'?allC.length:allC.filter(c=>c.dept===d.key).length;
    return`<button class="nb${curDept===d.key?' act':''}" onclick="selectDept('${d.key}')">
      <span class="ic">${d.icon}</span>${d.label}<span class="badge">${cnt}</span>
    </button>`;
  }).join('');
  const stats=document.getElementById('sbStats');
  const depts=new Set(allC.map(c=>c.dept)).size;
  const hubs=new Set(driverRaw.map(d=>d.from)).size;
  stats.innerHTML=`
    <div class="sb-stat"><div class="n">${allC.length}</div><div class="l">Total</div></div>
    <div class="sb-stat"><div class="n">${depts}</div><div class="l">Depts</div></div>
    <div class="sb-stat"><div class="n">${hubs}</div><div class="l">Hubs</div></div>`;
}

/* ═══════════════════════════════════════════════════
   MAIN RENDER
═══════════════════════════════════════════════════ */
function render(){
  const list=getFiltered();
  const dc=DEPTS.find(d=>d.key===curDept)||DEPTS[0];
  document.getElementById('pgTitle').textContent=dc.label;
  document.getElementById('pgCnt').textContent=list.length;
  document.getElementById('pgSub').textContent=curDept==='All'
    ?'SCS Essential Office Directory — All Departments'
    :`${dc.label} — ${list.length} contact${list.length!==1?'s':''}`;
  document.getElementById('filterResults').textContent=`${list.length} result${list.length!==1?'s':''}`;

  const box=document.getElementById('container');
  if(!list.length){
    box.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><p style="font-size:13px">No contacts match your search or filters.</p><p style="font-size:11px;margin-top:6px"><button onclick="clearFilters()" class="clear-btn" style="margin-top:6px">✕ Clear all filters</button></p></div>`;
    return;
  }

  if(curView==='card')  box.innerHTML=buildCards(list);
  else if(curView==='list') box.innerHTML=buildList(list);
  else box.innerHTML=buildTable(list);
}

/* ─ CARD VIEW ─ */
function buildCards(list){
  const grouped=groupByDept(list);
  return grouped.map(([dept,items])=>{
    const dc=DEPTS.find(d=>d.key===dept)||DEPTS[0];
    const groupHd=curDept==='All'?`<div class="dept-group-hd"><span class="dgh-title">${dc.icon} ${dept}</span><span class="dgh-cnt" style="background:${dc.bg};color:${dc.clr}">${items.length}</span></div>`:'';
    const cards=items.map(c=>{
      const dc2=DEPTS.find(d=>d.key===c.dept)||DEPTS[0];
      return`<div class="contact-card" style="--card-top:${dc2.top}">
        <div class="cc-hd">
          <div class="avatar" style="background:${avc(c._id)}">${ini(c.name)}</div>
          <div><div class="cc-name">${c.name}</div><div class="cc-role">${c.desig||''}</div></div>
        </div>
        <span class="dpill" style="background:${dc2.bg};color:${dc2.clr}">${c.dept}</span>
        <div class="cc-info">
          ${c.contact&&c.contact!=='N/A'?`<div class="ir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.42 2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.9.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6.29 6.29l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>${pl(c.contact,true)}</div>`:''}
          ${c.hub?`<div class="ir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span>${c.hub}</span></div>`:''}
          ${c.vehicle&&c.dept==='Driver'?`<div class="ir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="13" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><circle cx="8" cy="15" r="2"/><circle cx="16" cy="15" r="2"/></svg><span>${c.vehicle}</span></div>`:''}
          ${c.division&&c.dept!=='Driver'?`<div class="ir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg><span>${c.division}</span></div>`:''}
        </div>
        <div class="cc-acts">
          ${c.contact&&c.contact!=='N/A'?`<button class="ca p" onclick="window.location.href='tel:${c.contact.split('&')[0].replace(/\D/g,'')}'" >📞 Call</button>`:''}
        </div>
      </div>`;
    }).join('');
    return groupHd+`<div class="cards-grid" style="margin-bottom:${curDept==='All'?'0':'0'}">${cards}</div>`;
  }).join('');
}

/* ─ LIST VIEW ─ */
function buildList(list){
  const grouped=groupByDept(list);
  return grouped.map(([dept,items])=>{
    const dc=DEPTS.find(d=>d.key===dept)||DEPTS[0];
    const groupHd=curDept==='All'?`<div class="dept-group-hd"><span class="dgh-title">${dc.icon} ${dept}</span><span class="dgh-cnt" style="background:${dc.bg};color:${dc.clr}">${items.length}</span></div>`:'';
    const rows=items.map(c=>{
      const dc2=DEPTS.find(d=>d.key===c.dept)||DEPTS[0];
      return`<div class="li">
        <div class="avatar" style="background:${avc(c._id)};width:40px;height:40px;border-radius:11px;font-size:13px">${ini(c.name)}</div>
        <div class="li-info">
          <div class="li-name">${c.name}</div>
          <div class="li-role">${c.desig||''}</div>
        </div>
        <span class="dpill" style="background:${dc2.bg};color:${dc2.clr}">${c.dept}</span>
        <div class="li-meta">
          ${c.contact&&c.contact!=='N/A'?`<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.42 2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.9.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6.29 6.29l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg><a class="pl" href="tel:${c.contact.split('&')[0].replace(/\D/g,'')}">${c.contact.split('&')[0].trim()}</a></span>`:''}
          ${c.hub?`<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${c.hub}</span>`:''}
          ${c.vehicle&&c.dept==='Driver'?`<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="13" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>${c.vehicle}</span>`:''}
        </div>
      </div>`;
    }).join('');
    return groupHd+`<div class="list-view">${rows}</div>`;
  }).join('');
}

/* ─ TABLE VIEW ─ */
function buildTable(list){
  const grouped=groupByDept(list);
  return grouped.map(([dept,items])=>{
    const dc=DEPTS.find(d=>d.key===dept)||DEPTS[0];
    const groupHd=curDept==='All'?`<div class="dept-group-hd"><span class="dgh-title">${dc.icon} ${dept}</span><span class="dgh-cnt" style="background:${dc.bg};color:${dc.clr}">${items.length}</span></div>`:'';
    let tbl='';
    if(dept==='Driver')tbl=driverTable(items);
    else if(dept==='C4')tbl=c4Table(items);
    else if(dept==='Administration')tbl=adminTable(items);
    else if(dept==='IT')tbl=itTable(items);
    else if(dept==='Operation')tbl=opTable(items);
    return groupHd+tbl;
  }).join('');
}

function driverTable(items){
  return`<div class="tw"><div class="tw-scroll"><table>
    <thead><tr><th>#</th><th>Vehicle No.</th><th>Driver Name</th><th>Driver ID</th><th>Contact</th><th>Hub / Location</th></tr></thead>
    <tbody>${items.map((c,i)=>`<tr>
      <td>${i+1}</td>
      <td><span style="font-family:monospace;font-weight:800;font-size:11.5px;color:var(--text)">${c.vehicle}</span></td>
      <td><div class="tdn">${c.name}</div></td>
      <td><span class="tbadge" style="background:#FAEEDA;color:#7A4500">${c.driverId}</span></td>
      <td>${pl(c.contact,true)}</td>
      <td style="font-size:11px">${c.hub}</td>
    </tr>`).join('')}</tbody>
  </table></div></div>`;
}
function c4Table(items){
  return`<div class="tw"><div class="tw-scroll"><table>
    <thead><tr><th>#</th><th>Name</th><th>Contact</th><th>Division / Area</th><th>Hub</th></tr></thead>
    <tbody>${items.map((c,i)=>`<tr>
      <td>${i+1}</td><td><div class="tdn">${c.name}</div></td>
      <td>${pl(c.contact,true)}</td>
      <td style="font-size:11px">${c.division}</td>
      <td><span class="tbadge" style="background:#D8F3EA;color:#0D5C45">${c.hub}</span></td>
    </tr>`).join('')}</tbody>
  </table></div></div>`;
}
function adminTable(items){
  return`<div class="tw"><div class="tw-scroll"><table>
    <thead><tr><th>#</th><th>Name</th><th>Designation</th><th>Contact</th></tr></thead>
    <tbody>${items.map((c,i)=>`<tr>
      <td>${i+1}</td><td><div class="tdn">${c.name}</div></td>
      <td style="font-size:11px">${c.desig}</td>
      <td>${pl(c.contact,true)}</td>
    </tr>`).join('')}</tbody>
  </table></div></div>`;
}
function itTable(items){
  return`<div class="tw"><div class="tw-scroll"><table>
    <thead><tr><th>#</th><th>Name</th><th>Designation</th><th>Contact</th><th>Working Dept.</th></tr></thead>
    <tbody>${items.map((c,i)=>`<tr>
      <td>${i+1}</td><td><div class="tdn">${c.name}</div></td>
      <td style="font-size:11px">${c.desig}</td>
      <td>${pl(c.contact,true)}</td>
      <td><span class="tbadge" style="background:#EAE8FD;color:#3E2D87">${c.hub}</span></td>
    </tr>`).join('')}</tbody>
  </table></div></div>`;
}
function opTable(items){
  return`<div class="tw"><div class="tw-scroll"><table>
    <thead><tr><th>#</th><th>Name</th><th>Designation</th><th>Role / Area</th><th>Contact</th></tr></thead>
    <tbody>${items.map((c,i)=>`<tr>
      <td>${i+1}</td><td><div class="tdn">${c.name}</div></td>
      <td><span class="tbadge" style="background:#FAEBE7;color:#7A2610">${c.desig}</span></td>
      <td style="font-size:11px">${c.hub}</td>
      <td>${pl(c.contact,true)}</td>
    </tr>`).join('')}</tbody>
  </table></div></div>`;
}

/* ─ GROUP BY DEPT ─ */
function groupByDept(list){
  const order=['Driver','C4','Administration','IT','Operation'];
  if(curDept!=='All')return[[curDept,list]];
  const map={};
  list.forEach(c=>{if(!map[c.dept])map[c.dept]=[];map[c.dept].push(c);});
  return order.filter(d=>map[d]&&map[d].length).map(d=>[d,map[d]]);
}

/* ═══════════════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════════════ */
function selectDept(k){
  curDept=k;
  // sync filter select
  document.getElementById('fDept').value=k==='All'?'':k;
  document.getElementById('fDept').classList.toggle('has-val',k!=='All');
  if(window.innerWidth<=920)closeSB();
  renderNav();render();
}

function setView(v){
  curView=v;
  ['card','list','table'].forEach(x=>{
    const id='v'+x.charAt(0).toUpperCase()+x.slice(1);
    document.getElementById(id).classList.toggle('act',x===v);
  });
  render();
}

function toggleSB(){
  const sb=document.getElementById('sidebar');
  const bd=document.getElementById('sbBackdrop');
  const hb=document.getElementById('hbBtn');
  sb.classList.toggle('sb-open');
  bd.classList.toggle('show');
  hb.classList.toggle('open');
}
function closeSB(){
  document.getElementById('sidebar').classList.remove('sb-open');
  document.getElementById('sbBackdrop').classList.remove('show');
  document.getElementById('hbBtn').classList.remove('open');
}

function openModal(){document.getElementById('overlay').classList.add('open')}
function closeModal(){document.getElementById('overlay').classList.remove('open')}
function overlayClick(e){if(e.target===e.currentTarget)closeModal()}

function saveContact(){
  const name=document.getElementById('fn').value.trim();
  const dept=document.getElementById('fd').value;
  const role=document.getElementById('fr2').value.trim();
  const contact=document.getElementById('fc').value.trim();
  const fx=document.getElementById('fx').value.trim();
  const fy=document.getElementById('fy').value.trim();
  if(!name||!dept){alert('Name and Department are required.');return}
  allC.push({_id:nid++,dept,name,role,desig:role,hub:fx,division:fy,vehicle:fy,driverId:'',contact,extra1:fx,extra2:fy});
  closeModal();
  ['fn','fd','fr2','fc','fx','fy'].forEach(id=>document.getElementById(id).value='');
  populateFilters();renderNav();render();
}

function doPrint(){
  document.getElementById('printDate').textContent=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'});
  // Build print meta info
  const f=getFilters();
  let meta='Office Directory';
  if(curDept!=='All')meta+=` — ${curDept}`;
  if(f.role)meta+=` | Role: ${f.role}`;
  if(f.hub)meta+=` | Hub: ${f.hub}`;
  if(f.vehicle)meta+=` | Vehicle: ${f.vehicle}`;
  document.getElementById('printMeta').innerHTML=`${meta} — Printed on ${document.getElementById('printDate').textContent}`;
  // Force table view for best print output
  const prevView=curView;
  setView('table');
  setTimeout(()=>{window.print();setTimeout(()=>setView(prevView),300);},200);
}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
document.getElementById('vCard').classList.add('act');
populateFilters();
renderNav();
render();
</script>
</body>
</html>
